<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Adoptify</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../asset/css/style.css">
</head>
<body class="bg-light">

    <div class="container-fluid p-0 split-screen-container">
        <div class="row g-0 h-100 min-vh-100">
            
            <!-- LEFT SECTION: Visual/Illustration (50% width) -->
            <div class="col-lg-6 visual-side d-none d-lg-flex">
                <!-- Overlay Image (Paw prints or similar) -->
                <img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?q=80&w=1200&auto=format&fit=crop" 
                     alt="Rescue Theme" class="visual-overlay-img">
                
                <div class="visual-content">
                    <div class="mb-3">
                         <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75 mb-2" style="height: 60px;">
                    </div>
                    <h1 class="display-4 fw-black mb-4 tracking-tight">Every life deserves a home</h1>
                    <p class="lead mb-5 opacity-75 fw-medium">Join our mission to rescue and rehome animals in need. Every login counts towards a better future.</p>
                    
                    <div class="d-flex justify-content-center flex-wrap">
                        <div class="auth-stat-badge">
                            <span class="d-block fs-4">0+</span>
                            <span class="x-small opacity-75">Animals Rescued</span>
                        </div>
                        <div class="auth-stat-badge">
                            <span class="d-block fs-4">0+</span>
                            <span class="x-small opacity-75">Happy Adoptions</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT SECTION: Login Form (50% width) -->
            <div class="col-12 col-lg-6 form-side">
                <div class="auth-card">
                    
                    <!-- Paw Icon & Title -->
                    <div class="text-center mb-5">
                        <div class="auth-icon-circle">
                            <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75 mb-2" style="height: 60px;">
                        </div>
                        <h2 class="fw-black text-dark mb-1">Welcome Back!</h2>
                        <p class="text-muted fw-medium small">Login to your Adoptify account</p>
                    </div>

                    <!-- Error Alert -->
                    <div id="error-alert" class="alert alert-danger d-none small fw-bold mb-4 border-0 rounded-4 p-3 shadow-none" role="alert">
                         Invalid email or password
                    </div>

                    <form id="login-form">
                        
                        <!-- Email Field -->
                        <div class="form-floating mb-4">
                            <input type="email" class="form-control rounded-4 px-4 shadow-none" 
                                   id="email" placeholder="you@example.com" required>
                            <label for="email" class="px-4 text-muted small fw-bold">Email Address</label>
                        </div>

                        <!-- Password Field -->
                        <div class="position-relative mb-4">
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-4 px-4 pr-5 shadow-none" 
                                       id="password" placeholder="Enter your password" required minlength="6">
                                <label for="password" class="px-4 text-muted small fw-bold">Password</label>
                            </div>
                            <button type="button" id="toggle-password" 
                                    class="btn position-absolute top-50 end-0 translate-middle-y border-0 text-muted px-4 shadow-none">
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>

                        <!-- Forgot & Remember Me -->
                        <div class="d-flex justify-content-between align-items-center mb-5 px-1">
                            <div class="form-check">
                                <input class="form-check-input shadow-none cursor-pointer" type="checkbox" id="rememberMe" style="width: 1.25rem; height: 1.25rem;">
                                <label class="form-check-label small fw-bold text-muted ms-2 cursor-pointer" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="forgot-password.html" class="text-brand text-decoration-none small fw-black">Forgot Password?</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" id="submit-btn" class="btn btn-brand w-100 py-3 shadow-lg mb-4">
                            <span id="btn-text">LOGIN</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </form>

                    <!-- Register Link -->
                    <div class="text-center mt-5">
                        <p class="text-muted small fw-medium">
                            Don't have an account? 
                            <a href="register.html" class="text-brand text-decoration-none fw-black ms-1">Create an account</a>
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS for Login Logic -->
    <script src="../asset/js/login.js"></script>
</body>
</html>
