<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Adoptify</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../asset/css/style.css">
</head>
<body class="bg-light">

    <div class="container-fluid p-0 split-screen-container">
        <div class="row g-0">
            
            <!-- LEFT SECTION: Visual (50% width) -->
            <div class="col-lg-6 visual-side d-none d-lg-flex">
                <img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?q=80&w=1200&auto=format&fit=crop" 
                     alt="Reset Theme" class="visual-overlay-img">
                
                <div class="visual-content">
                    <div class="mb-5 text-center">
                         <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75 mb-4" style="height: 60px;">
                    </div>
                    <h1 class="display-4 fw-black mb-4 tracking-tight">Don't worry! We'll help you reset your password</h1>
                    <p class="lead mb-5 opacity-75 fw-medium">Enter your registered email below to receive a password reset link.</p>
                </div>
            </div>

            <!-- RIGHT SECTION: Reset Form (50% width) -->
            <div class="col-12 col-lg-6 form-side bg-white shadow-sm">
                <div class="auth-card">
                    
                    <!-- Paw Icon & Title -->
                    <div class="text-center mb-5">
                        <div class="auth-icon-circle">
                             <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75" style="height: 35px;">
                        </div>
                        <h2 class="fw-black text-dark mb-1">Forgot Password?</h2>
                        <p class="text-muted fw-medium small">Enter your email to reset your password</p>
                    </div>

                    <!-- Alerts -->
                    <div id="error-alert" class="alert alert-danger d-none small fw-bold mb-4 border-0 rounded-4 p-3 shadow-none" role="alert">
                         Email not found
                    </div>
                    <div id="success-alert" class="alert alert-success d-none small fw-bold mb-4 border-0 rounded-4 p-3 shadow-none" role="alert" style="background-color: #d1fae5; color: #065f46;">
                         Reset link sent to email! Redirecting...
                    </div>

                    <form id="forgot-form">
                        
                        <!-- Email Field -->
                        <div class="form-floating mb-5">
                            <input type="email" class="form-control rounded-4 px-4 shadow-none" name="email"
                                   id="email" placeholder="you@example.com" required>
                            <label for="email" class="px-4 text-muted small fw-bold">
                                <i class="fa-solid fa-envelope me-2 opacity-50"></i> Email Address
                            </label>
                        </div>

                        <!-- Reset Button -->
                        <button type="submit" id="submit-btn" class="btn btn-brand w-100 py-3 shadow-lg mb-4" disabled>
                            <span id="btn-text">SEND RESET LINK</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                        </button>

                        <!-- Back to Login -->
                        <div class="text-center mt-4">
                            <a href="login.html" class="text-brand text-decoration-none fw-black small">
                                <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS for Forgot Password Logic -->
    <script src="../asset/js/forgot-password.js"></script>
</body>
</html>
