<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Adoptify</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="../asset/css/style.css">
</head>
<body class="bg-light">

    <div class="container-fluid p-0 split-screen-container">
        <div class="row g-0">
            
            <!-- LEFT SECTION: Visual (50% width) -->
            <div class="col-lg-6 visual-side d-none d-lg-flex">
                <img src="https://images.unsplash.com/photo-1614064641938-3bbee52942c7?q=80&w=1200&auto=format&fit=crop" 
                     alt="Security Theme" class="visual-overlay-img">
                
                <div class="visual-content">
                    <div class="mb-5 text-center">
                         <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75 mb-4" style="height: 60px;">
                    </div>
                    <h1 class="display-4 fw-black mb-4 tracking-tight">Security First</h1>
                    <p class="lead mb-5 opacity-75 fw-medium">Reset your password to keep your Adoptify account safe and secure.</p>
                </div>
            </div>

            <!-- RIGHT SECTION: Reset Form (50% width) -->
            <div class="col-12 col-lg-6 form-side bg-white shadow-sm">
                <div class="auth-card">
                    
                    <!-- Paw Icon & Title -->
                    <div class="text-center mb-5">
                        <div class="auth-icon-circle">
                             <img src="../asset/Images/logo.png" alt="Logo" class="filter-white opacity-75" style="height: 35px;">
                        </div>
                        <h2 class="fw-black text-dark mb-1">Reset Password</h2>
                        <p class="text-muted fw-medium small">Enter your new secure password</p>
                    </div>

                    <!-- Alerts -->
                    <div id="error-alert" class="alert alert-danger d-none small fw-bold mb-4 border-0 rounded-4 p-3 shadow-none" role="alert">
                         Invalid or expired reset link
                    </div>
                    <div id="success-alert" class="alert alert-success d-none small fw-bold mb-4 border-0 rounded-4 p-3 shadow-none" role="alert" style="background-color: #d1fae5; color: #065f46;">
                         Password reset successfully! Redirecting...
                    </div>

                    <form id="reset-form">
                        
                        <!-- New Password -->
                        <div class="position-relative mb-4">
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-4 px-4 shadow-none" name="password"
                                       id="password" placeholder="Enter new password" required minlength="6">
                                <label for="password" class="px-4 text-muted small fw-bold">New Password</label>
                            </div>
                            <button type="button" id="toggle-password" 
                                    class="btn position-absolute top-50 end-0 translate-middle-y border-0 text-muted px-4 shadow-none">
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>

                        <!-- Confirm Password -->
                        <div class="position-relative mb-5">
                            <div class="form-floating">
                                <input type="password" class="form-control rounded-4 px-4 shadow-none" id="confirmPassword" 
                                       placeholder="Confirm new password" required>
                                <label for="confirmPassword" class="px-4 text-muted small fw-bold">Confirm New Password</label>
                            </div>
                            <button type="button" id="toggle-confirm-password" 
                                    class="btn position-absolute top-50 end-0 translate-middle-y border-0 text-muted px-4 shadow-none">
                                <i class="fa-solid fa-eye-slash"></i>
                            </button>
                        </div>

                        <!-- Reset Button -->
                        <button type="submit" id="submit-btn" class="btn btn-brand w-100 py-3 shadow-lg mb-4" disabled>
                            <span id="btn-text">RESET PASSWORD</span>
                            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                        </button>

                        <!-- Back to Login -->
                        <div class="text-center mt-4">
                            <a href="login.html" class="text-brand text-decoration-none fw-black small">
                                <i class="fa-solid fa-arrow-left me-2"></i> Back to Login
                            </a>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JS for Reset Password Logic -->
    <script src="../asset/js/reset-password.js"></script>
</body>
</html>
