<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Adoptify</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../asset/css/style.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .admin-login-card { background: white; border-radius: 20px; padding: 3rem; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .admin-brand { color: #f59e0b; font-weight: 800; font-size: 1.5rem; text-align: center; margin-bottom: 2rem; }
        .btn-admin { background-color: #1a202c; color: white; border: none; padding: 0.8rem; border-radius: 12px; font-weight: 700; width: 100%; transition: all 0.3s; }
        .btn-admin:hover { background-color: #000; transform: translateY(-2px); color: white;}
    </style>
</head>
<body>
    <div class="admin-login-card animate__animated animate__fadeIn">
        <div class="admin-brand">
            <i class="fa-solid fa-shield-halved me-2"></i>ADOPTIFY ADMIN
        </div>
        <h2 class="fw-bold mb-1">Welcome, Admin</h2>
        <p class="text-muted small mb-4">Please log in to manage the platform</p>
        
        <form id="adminLoginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">Email Address</label>
                <input type="email" id="email" class="form-control rounded-3 py-2" required placeholder="admin@adoptify.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <input type="password" id="password" class="form-control rounded-3 py-2" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-admin mb-3">SECURE LOGIN</button>
            <div class="text-center">
                <a href="../index.html" class="text-decoration-none small text-muted font-weight-bold"><i class="fa-solid fa-arrow-left me-1"></i> Back to Main Site</a>
            </div>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch('http://localhost:8080/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    if (data.role !== 'ADMIN') {
                        Swal.fire('Access Denied', 'You do not have administrative privileges.', 'error');
                        return;
                    }
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = 'admin-dashboard.html';
                } else {
                    Swal.fire('Login Failed', data.message || 'Invalid credentials', 'error');
                }
            } catch (error) {
                Swal.fire('Error', 'Could not connect to server', 'error');
            }
        });
    </script>
</body>
</html>
